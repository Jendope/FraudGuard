# docker-compose.yml — HK FraudGuard production deployment
#
# Services
# --------
#   backend   Flask API (OCR → LLM, Whisper STT, RAG fraud detection)
#   frontend  React SPA served via nginx (proxies /api, /process, /transcribe)
#
# Quick start
# -----------
#   1. Copy .env.example to .env and fill in DASHSCOPE_API_KEY.
#   2. docker compose up --build
#   3. Open http://localhost in your browser.
#
# Environment variables (set in .env or the shell):
#   DASHSCOPE_API_KEY  — required: Alibaba Cloud DashScope API key
#   WHISPER_MODEL      — optional: "tiny"|"base"|"small"|"medium"|"large" (default: base)
#   WHISPER_DEVICE     — optional: "cpu"|"cuda" (default: cpu)
#   WHISPER_LANGUAGE   — optional: ISO-639-1 language hint (default: auto-detect)
#   DEFAULT_MODE       — optional: "raw"|"rag" (default: raw)
#   LLM_MODEL          — optional: LLM model slug (default: deepseek/deepseek-llm)
#   VITE_API_BASE      — optional: build-time API base URL for frontend

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEFAULT_MODE:      ${DEFAULT_MODE:-raw}
      LLM_MODEL:         ${LLM_MODEL:-deepseek/deepseek-llm}
      WHISPER_MODEL:     ${WHISPER_MODEL:-base}
      WHISPER_DEVICE:    ${WHISPER_DEVICE:-cpu}
      WHISPER_LANGUAGE:  ${WHISPER_LANGUAGE:-}
      EMBED_MODEL:       ${EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      RAG_TOP_K:         ${RAG_TOP_K:-3}
      CHROMA_DB_PATH:    /app/rag-pipeline/chroma_hk01_scam_db
      DEBUG:             "false"
    volumes:
      # Mount the ChromaDB vector store so the backend can persist/read it.
      - ./rag-pipeline/chroma_hk01_scam_db:/app/rag-pipeline/chroma_hk01_scam_db:ro
      # Named volume for cached Whisper & HuggingFace model weights.
      - model_cache:/root/.cache
    ports:
      # Expose the backend port for direct access during development.
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In production the SPA talks to the backend through the nginx proxy,
        # so we set VITE_API_BASE to an empty string (same origin).
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  model_cache:
    driver: local

# nginx.conf — production configuration for the React SPA.
#
# Serves the Vite build output and proxies /api/* and /process /transcribe
# requests to the Flask backend so the frontend and backend share the same
# origin (avoids CORS in production).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression for text assets.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 1024;

    # Cache-busted assets (Vite adds content hashes to filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to the Flask backend.
    # In Docker Compose the backend is reachable at http://backend:5000.
    location ~ ^/(api|process|transcribe) {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        # Allow large audio uploads.
        client_max_body_size 50M;
    }

    # SPA fallback — let React Router handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

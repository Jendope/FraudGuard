# CI — runs linting and tests on every push / pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend (Python) ──────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: pip install ruff && ruff check .

      - name: Run tests
        run: pytest tests/ -v

  # ── Web Interface (Next.js / TypeScript) ────────────────────────
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrauGuard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
